<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Against the Caption — Bronx Memory Map</title>

  <!-- Leaflet -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    :root{
      --bg:#0b0f17;
      --panel:#0f1624;
      --panel2:#111b2c;
      --text:#e9eef9;
      --muted:#a9b6d3;
      --line:#22304a;
      --chip:#1a2740;
      --accent:#b8a7ff;
      --accent2:#7fe7d3;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    /* =========================
       DESKTOP LAYOUT
    ========================== */
    .app{
      display:grid;
      grid-template-columns: 420px 1fr;
      height:100dvh;
      overflow:hidden;
    }

    .sidebar{
      background:linear-gradient(180deg,var(--panel),var(--panel2));
      border-right:1px solid var(--line);
      padding:18px 16px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      order:1;
    }

    .map-wrap{
      position:relative;
      height:100%;
      min-height:0;
      order:2;
    }

    #map{
      height:100%;
      width:100%;
      filter: brightness(.96) saturate(.95);
    }

    .map-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background: radial-gradient(
        circle at center,
        rgba(0,0,0,0) 48%,
        rgba(0,0,0,.24) 100%
      );
    }

    /* =========================
       SIDEBAR CONTENT
    ========================== */
    .title{
      font-size:20px;
      font-weight:700;
      margin:0 0 6px 0;
      line-height:1.15;
    }

    .subtitle{
      margin:0 0 14px 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.35;
    }

    .top-actions{
      display:flex;
      gap:10px;
      margin:10px 0 16px 0;
      flex-wrap:wrap;
    }

    .btn{
      appearance:none;
      border:1px solid var(--line);
      background:#0f1a2e;
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      font-weight:600;
      font-size:13px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
    }

    .btn:hover{
      border-color:#324567;
    }

    .btn.primary{
      background:linear-gradient(135deg, rgba(184,167,255,.2), rgba(127,231,211,.15));
      border-color:#3b4f78;
    }

    .filters{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-bottom:14px;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    label{
      font-size:12px;
      color:var(--muted);
    }

    input, select{
      width:100%;
      padding:10px 10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#0c1424;
      color:var(--text);
      outline:none;
    }

    input::placeholder{
      color:#7f8fb3;
    }

    .count{
      color:var(--muted);
      font-size:12px;
      margin:8px 0 10px 0;
    }

    .cards{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .empty-state{
      border:1px dashed #2a3b5c;
      background:rgba(12,20,36,.55);
      border-radius:14px;
      padding:14px 12px;
      color:var(--muted);
      font-size:13px;
      line-height:1.4;
    }

    .empty-state code{
      color:#cfe0ff;
      font-size:12px;
    }

    /* =========================
       ENTRY CARDS
    ========================== */
    .card{
      border:1px solid rgba(34,48,74,0.9);
      border-left:4px solid #7fe7d3;
      background:rgba(12,20,36,.55);
      border-radius:14px;
      padding:14px 14px;
      cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .card:hover{
      transform: translateY(-1px);
      border-color:#3b4f78;
      background:rgba(14,26,46,.75);
    }

    .card h3{
      margin:0 0 10px 0;
      font-size:16px;
      line-height:1.2;
      letter-spacing:.2px;
    }

    .meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .chip{
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid #2a3b5c;
      color:#cfe0ff;
    }

    /* =========================
       POPUP
    ========================== */
    .leaflet-popup-content-wrapper{
      background: rgba(9, 13, 22, 0.97) !important;
      color: #f2f6ff !important;
      border: 1px solid rgba(184,167,255,0.28) !important;
      box-shadow: 0 18px 60px rgba(0,0,0,0.55) !important;
      border-radius: 16px !important;
    }

    .leaflet-popup-tip{
      background: rgba(9, 13, 22, 0.97) !important;
      box-shadow: none !important;
      border: 1px solid rgba(184,167,255,0.25) !important;
    }

    .leaflet-popup-content{
      margin:14px 16px 16px 16px !important;
      width:320px !important;
      max-height:min(520px, calc(100vh - 140px)) !important;
      overflow-y:auto !important;
      overscroll-behavior:contain;
      padding-right:6px;
    }

    .leaflet-popup-content::-webkit-scrollbar{ width:8px; }
    .leaflet-popup-content::-webkit-scrollbar-thumb{
      background: rgba(127,231,211,0.22);
      border-radius:10px;
    }

    .leaflet-popup-content .btn{
      padding:9px 11px;
      border-radius:10px;
      font-size:12.5px;
    }

    .archive-label{
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(127,231,211,0.9);
      margin-bottom:6px;
      opacity:.9;
    }

    .popup h2{
      font-size:18px;
      margin:6px 0 8px 0;
      color:#fff;
      letter-spacing:.2px;
      font-weight:600;
      line-height:1.2;
    }

    .popup .pmeta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:10px;
    }

    .popup p{
      color:#e8efff !important;
      font-size:14px;
      line-height:1.62;
      letter-spacing:.2px;
      margin:0 0 10px 0;
      white-space:pre-wrap;
    }

    .small{
      font-size:11px;
      color:#91a4c9;
      margin-top:6px;
      line-height:1.35;
    }

    .media{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .media img{
      width:100%;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.10);
      box-shadow:0 10px 28px rgba(0,0,0,0.35);
      display:block;
    }

    .soundtrack{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid rgba(34,48,74,0.7);
    }

    .soundtrack .label{
      font-size:10px;
      letter-spacing:.18em;
      text-transform:uppercase;
      color:rgba(127,231,211,0.85);
      margin-bottom:8px;
    }

    /* =========================
       MOBILE: MAP FIRST
    ========================== */
    @media (max-width: 980px){
      .app{
        grid-template-columns: 1fr;
        grid-template-rows: 52dvh 48dvh;
        height:100dvh;
      }

      .map-wrap{
        order:1;
        height:52dvh;
        min-height:52dvh;
      }

      .sidebar{
        order:2;
        height:48dvh;
        min-height:48dvh;
        overflow:auto;
        padding:14px 12px 18px 12px;
        border-right:none;
        border-top:1px solid var(--line);
      }

      #map{
        height:52dvh;
        min-height:52dvh;
      }

      .filters{
        grid-template-columns: 1fr;
      }

      .leaflet-popup-content{
        width:min(82vw, 285px) !important;
        max-height:34dvh !important;
      }

      .popup h2{
        font-size:16px;
      }

      .popup p{
        font-size:13px;
        line-height:1.5;
      }

      .media img{
        max-height:160px;
        object-fit:cover;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <h1 class="title">Against the Caption — Bronx Memory Map</h1>
      <p class="subtitle">
        A Bronx-centered, community-rooted memory archive. Entries are mapped with <b>approximate locations</b> to protect privacy.
      </p>

      <div class="top-actions">
        <a class="btn primary" id="submitLink" href="#" target="_blank" rel="noreferrer">
          Submit a memory
        </a>
        <button class="btn" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="filters">
        <div class="field">
          <label for="q">Search</label>
          <input id="q" placeholder="title, neighborhood, tags, text…" />
        </div>

        <div class="field">
          <label for="decade">Decade</label>
          <select id="decade">
            <option value="all">All</option>
          </select>
        </div>

        <div class="field">
          <label for="hood">Neighborhood</label>
          <select id="hood">
            <option value="all">All</option>
          </select>
        </div>

        <div class="field">
          <label for="tag">Tag</label>
          <select id="tag">
            <option value="all">All</option>
          </select>
        </div>
      </div>

      <div class="count" id="count">0 entries</div>

      <section class="cards" id="cards">
        <div class="empty-state">
          No entries yet — this is intentionally blank.<br/><br/>
          When you’re ready, add items inside the <code>entries</code> array in the code.
        </div>
      </section>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>

  <script>
    /* =========================
       SETTINGS
    ========================== */
    const submitUrl = "https://tally.so/r/81dD5O";
    document.getElementById("submitLink").href = submitUrl;

    /* =========================
       ENTRIES
    ========================== */
    const entries = [
  {
    id: "BX-0001",
    title: "Looking out from the Bronx",
    neighborhood: "Soundview",
    decade: "2020s",
    tags: ["growing-up-in-the-bronx","the-block","migration-stories"],
    lat: 40.8200,
    lng: -73.8800,
    story: `I took this photo looking out across the Bronx skyline. It’s the kind of view you see when you’re moving through the city, from a train, a bridge, somewhere in between places.

I’ve spent a lot of time thinking about leaving the Bronx, coming back to it, and trying to understand what it means to carry a place with you even when you’re somewhere else. This photo feels like that moment: looking out, looking back, trying to see the Bronx again.`,
    artifact:{
      type:"image",
      url:"assets/images/bronx-skyline.jpg"
    },
    contributorCredit:"Contributor submission (anonymous)"
  },

  {
    id: "BX-0002",
    title: "Francis Martin Library after school",
    neighborhood: "Morris Heights",
    decade: "2000s",
    tags: ["growing-up-in-the-bronx","organizing-activism","migration-stories"],
    lat: 40.8505,
    lng: -73.9135,
    story: `On 181st and University, there is a library called the Francis Martin Library. This library is where I would go after school when I went to middle school around Andrew’s Ave.

I would go here to read manga and books like The Coldest Winter Ever by Sistah Souljah and Fly Girl by Omar Tyree.

As a middle schooler, this library was a refuge for me and also a place to chat with people online since I didn’t have WiFi at home.`,
    contributorCredit:"Contributor submission (anonymous)",
    soundtrack:{
      label:"Can’t Help But Wait — Trey Songz",
      spotifyUrl:"https://open.spotify.com/track/5k3VjTwIsOjQ2woGz3Yx71"
    }
  },

  {
    id: "BX-0003",
    title: "Summers at Mema’s House",
    neighborhood: "South Bronx",
    decade: "Early 2000s",
    tags: ["growing-up-in-the-bronx","everyday-bronx-life","black-bronx-life"],
    lat: 40.8185,
    lng: -73.8675,
    story: `Growing up I spent summers at my grandmother’s apartment and every Christmas at the foot of her tree. That apartment was a grounding home we all could return to as a family.

Somehow she managed to make a two bedroom apartment in the projects feel like a mansion — an endless expanse of adventure.

She taught me to read Black literature and we watched hours of movies and TV shows, laughing until our sides hurt.

My Mema and her home is the keeper of memory in my family, and it’s a cherished place.`,
    contributorCredit:"Contributor submission (Kaia)",
    soundtrack:{
      label:"Never Too Much — Luther Vandross",
      spotifyUrl:"https://open.spotify.com/search/Never%20Too%20Much%20Luther%20Vandross"
    }
  }
];

    /* =========================
       MAP SETUP
    ========================== */
    const map = L.map("map", { zoomControl: true });

    // tighter bounds so it feels more centered on the Bronx
    const bronxBounds = L.latLngBounds(
      [40.805, -73.930],
      [40.905, -73.805]
    );

    map.setMaxBounds(bronxBounds);
    map.options.maxBoundsViscosity = 0.9;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const markerById = new Map();

    /* =========================
       HELPERS
    ========================== */
    function normalize(s){
      return String(s ?? "").toLowerCase().trim();
    }

    function escapeHtml(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function escapeAttr(str){
      return escapeHtml(str);
    }

    function uniqueSorted(arr){
      return Array.from(new Set(arr.filter(Boolean))).sort((a,b) => a.localeCompare(b));
    }

    function populateSelect(selectId, values){
      const sel = document.getElementById(selectId);
      const current = sel.value;

      const options = [`<option value="all">All</option>`]
        .concat(values.map(v => `<option value="${escapeAttr(v)}">${escapeHtml(v)}</option>`));

      sel.innerHTML = options.join("");

      if ([...sel.options].some(o => o.value === current)) {
        sel.value = current;
      }
    }

    /* =========================
       POPUP HTML
    ========================== */
    function popupHtml(e){
      const tagChips = (e.tags || []).map(t => `<span class="chip">${escapeHtml(t)}</span>`).join("");

      let mediaHtml = "";
      if (e.artifact && e.artifact.type === "image" && e.artifact.url) {
        mediaHtml = `
          <div class="media">
            <img src="${escapeAttr(e.artifact.url)}" alt="artifact image"/>
            ${e.artifact.credit ? `<div class="small">${escapeHtml(e.artifact.credit)}</div>` : ""}
          </div>
        `;
      }

      let soundtrackHtml = "";
      if (e.soundtrack && e.soundtrack.spotifyUrl) {
        soundtrackHtml = `
          <div class="soundtrack">
            <div class="label">Memory soundtrack</div>
            ${e.soundtrack.label ? `<div class="small">${escapeHtml(e.soundtrack.label)}</div>` : ""}
            <div style="margin-top:10px;">
              <a class="btn primary" href="${escapeAttr(e.soundtrack.spotifyUrl)}" target="_blank" rel="noreferrer">
                Open in Spotify
              </a>
            </div>
          </div>
        `;
      }

      return `
        <div class="popup">
          <div class="archive-label">AGAINST THE CAPTION • BRONX MEMORY MAP</div>
          <h2>${escapeHtml(e.title)}</h2>

          <div class="pmeta">
            <span class="chip">${escapeHtml(e.neighborhood)}</span>
            <span class="chip">${escapeHtml(e.decade)}</span>
            ${tagChips}
          </div>

          <p>${escapeHtml(e.story)}</p>

          ${mediaHtml}
          ${soundtrackHtml}
          ${e.contributorCredit ? `<div class="small">${escapeHtml(e.contributorCredit)}</div>` : ""}
        </div>
      `;
    }

    /* =========================
       RENDER MARKERS
    ========================== */
    function renderMarkers(list){
      markerLayer.clearLayers();
      markerById.clear();

      list.forEach(e => {
        const m = L.circleMarker([e.lat, e.lng], {
          radius: 11,
          weight: 3,
          color: "#0b0f17",
          fillColor: "#7fe7d3",
          fillOpacity: 0.95
        }).addTo(markerLayer);

        const isMobile = window.matchMedia("(max-width: 980px)").matches;

        m.bindPopup(popupHtml(e), {
          maxWidth: 340,
          autoPan: true,
          autoPanPaddingTopLeft: isMobile ? [14, 20] : [460, 24],
          autoPanPaddingBottomRight: isMobile ? [14, 24] : [24, 24]
        });

        markerById.set(e.id, m);
      });
    }

    /* =========================
       RENDER CARDS
    ========================== */
    function renderCards(list){
      const cards = document.getElementById("cards");
      const count = document.getElementById("count");

      count.textContent = `${list.length} entr${list.length === 1 ? "y" : "ies"}`;

      if (list.length === 0) {
        cards.innerHTML = `
          <div class="empty-state">
            No entries yet — this is intentionally blank.<br/><br/>
            Add approved entries inside the <code>entries</code> array in the code.
          </div>
        `;
        return;
      }

      cards.innerHTML = list.map(e => {
        const chips = [
          `<span class="chip">${escapeHtml(e.neighborhood)}</span>`,
          `<span class="chip">${escapeHtml(e.decade)}</span>`,
          ...(e.tags || []).slice(0,3).map(t => `<span class="chip">${escapeHtml(t)}</span>`)
        ].join("");

        return `
          <article class="card" data-id="${escapeAttr(e.id)}">
            <h3>${escapeHtml(e.title)}</h3>
            <div class="meta">${chips}</div>
          </article>
        `;
      }).join("");

      cards.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
          const id = card.getAttribute("data-id");
          const m = markerById.get(id);
          if (!m) return;

          const isMobile = window.matchMedia("(max-width: 980px)").matches;
          const zoom = isMobile ? 13 : 14;

          if (isMobile) {
            // mobile: keep marker centered and just open popup after move
            map.flyTo(m.getLatLng(), zoom, { animate: true, duration: 0.6 });

            map.once("moveend", () => {
              m.openPopup();
            });
          } else {
            map.flyTo(m.getLatLng(), zoom, { animate: true, duration: 0.6 });

            map.once("moveend", () => {
              m.openPopup();
              setTimeout(() => {
                map.panInside(m.getLatLng(), {
                  paddingTopLeft: [460, 120],
                  paddingBottomRight: [24, 24]
                });
              }, 50);
            });
          }
        });
      });
    }

    /* =========================
       FILTERING
    ========================== */
    function applyFilters(){
      const q = normalize(document.getElementById("q").value);
      const decade = document.getElementById("decade").value;
      const hood = document.getElementById("hood").value;
      const tag = document.getElementById("tag").value;

      const filtered = entries.filter(e => {
        if (decade !== "all" && e.decade !== decade) return false;
        if (hood !== "all" && e.neighborhood !== hood) return false;
        if (tag !== "all" && !(e.tags || []).includes(tag)) return false;

        if (!q) return true;

        const hay = [
          e.title,
          e.neighborhood,
          e.decade,
          (e.tags || []).join(" "),
          e.story
        ].join(" ");

        return normalize(hay).includes(q);
      });

      renderMarkers(filtered);
      renderCards(filtered);
    }

    /* =========================
       INIT
    ========================== */
    function init(){
      populateSelect("decade", uniqueSorted(entries.map(e => e.decade)));
      populateSelect("hood", uniqueSorted(entries.map(e => e.neighborhood)));
      populateSelect("tag", uniqueSorted(entries.flatMap(e => e.tags || [])));

      renderMarkers(entries);
      renderCards(entries);

      const isMobile = window.matchMedia("(max-width: 980px)").matches;
      map.fitBounds(bronxBounds, {
        padding: isMobile ? [10,10] : [24,24],
        maxZoom: isMobile ? 11 : 13
      });

      ["q","decade","hood","tag"].forEach(id => {
        document.getElementById(id).addEventListener("input", applyFilters);
        document.getElementById(id).addEventListener("change", applyFilters);
      });

      document.getElementById("resetBtn").addEventListener("click", () => {
        document.getElementById("q").value = "";
        document.getElementById("decade").value = "all";
        document.getElementById("hood").value = "all";
        document.getElementById("tag").value = "all";

        applyFilters();

        const isMobile = window.matchMedia("(max-width: 980px)").matches;
        map.fitBounds(bronxBounds, {
          padding: isMobile ? [10,10] : [24,24],
          maxZoom: isMobile ? 11 : 13
        });
      });
    }

    init();
  </script>
</body>
</html>
